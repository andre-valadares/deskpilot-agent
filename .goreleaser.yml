version: 2

before:
  hooks:
    - go mod tidy

builds:
  - binary: deskpilot-agent
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "deskpilot-agent_{{ .Os }}_{{ .Arch }}"

release:
  extra_files:
    - glob: install.sh
    - glob: install.ps1

checksum:
  name_template: "checksums.txt"
